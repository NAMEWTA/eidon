name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── macOS ARM64 ──────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build (macOS ARM64)
        working-directory: app
        run: pnpm tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Collect into release/
        run: |
          mkdir -p release
          cp app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: EIDON-macos-arm64
          path: release/*.dmg

  # ── Windows x64 ──────────────────────────────────────────────
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build (Windows x64)
        working-directory: app
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Collect into release/
        shell: bash
        run: |
          mkdir -p release
          cp app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe release/

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EIDON-windows-x64
          path: release/*.exe
