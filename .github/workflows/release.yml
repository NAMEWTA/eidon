name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check tag matches app/package.json
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r .version app/package.json)
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch — tag '$TAG' must equal app/package.json ($PKG)"
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: verify-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-15
            dist: dist:mac
          - name: Windows
            runner: windows-latest
            dist: dist:win
          - name: Linux
            runner: ubuntu-22.04
            dist: dist:linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --dir app --frozen-lockfile --ignore-scripts

      - name: Build & package ${{ matrix.name }}
        working-directory: app
        run: pnpm build && electron-builder --publish never ${{ matrix.dist == 'dist:mac' && '--mac' || matrix.dist == 'dist:win' && '--win' || '--linux' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 签名/公证（仓库 Secrets 配置后生效；缺失时 electron-builder 跳过签名出未签名包）。
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          if-no-files-found: error
          path: |
            app/dist-app/*.dmg
            app/dist-app/*.exe
            app/dist-app/*.msi
            app/dist-app/*.deb
            app/dist-app/*.rpm
            app/dist-app/*.yml
            app/dist-app/*.blockmap

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate changelog from conventional commits
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${GITHUB_REF_NAME}$" | tail -1)
          if [ -z "$PREV_TAG" ]; then RANGE="HEAD"; else RANGE="${PREV_TAG}..HEAD"; fi
          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          emit() {
            local title="$1" grep="$2"
            local body
            body=$(git log "$RANGE" --pretty=format:"- %s" --grep="$grep" || true)
            if [ -n "$body" ]; then
              echo "### $title" >> CHANGELOG.md
              echo "$body" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi
          }
          emit "🚀 Features" "^feat"
          emit "🐛 Bug Fixes" "^fix"
          emit "🔧 Refactoring" "^refactor"
          emit "📦 Chores" "^chore"
          emit "📝 Documentation" "^docs"
          emit "✅ Tests" "^test"
          echo "Generated changelog:"; cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: release-artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
