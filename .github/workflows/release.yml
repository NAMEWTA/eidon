name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check tag matches package.json / Cargo.toml / tauri.conf.json
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r .version app/package.json)
          TAURI=$(jq -r .version app/src-tauri/tauri.conf.json)
          CARGO=$(awk -F\" '/^version[[:space:]]*=/ {print $2; exit}' app/src-tauri/Cargo.toml)
          echo "tag=$TAG package.json=$PKG tauri.conf.json=$TAURI Cargo.toml=$CARGO"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$TAURI" ] || [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch — tag '$TAG' must equal package.json ($PKG), tauri.conf.json ($TAURI), and Cargo.toml ($CARGO)"
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: verify-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            artifact_name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: --bundles nsis,msi
          - name: Windows ARM64
            artifact_name: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle_args: --bundles nsis,msi
          - name: macOS x86_64
            artifact_name: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundle_args: --bundles dmg
          - name: macOS ARM64
            artifact_name: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            bundle_args: --bundles dmg
          - name: Linux x86_64
            artifact_name: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_args: --bundles deb,rpm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --dir app --frozen-lockfile --ignore-scripts

      - name: Build ${{ matrix.name }}
        working-directory: app
        run: pnpm tauri build --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            app/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            app/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate changelog from conventional commits
        run: |
          # Find previous tag (the one before this release)
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${GITHUB_REF_NAME}$" | tail -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Features
          FEATS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" || true)
          if [ -n "$FEATS" ]; then
            echo "### 🚀 Features" >> CHANGELOG.md
            echo "$FEATS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Bug Fixes
          FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG.md
            echo "$FIXES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Refactors
          REFS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^refactor" || true)
          if [ -n "$REFS" ]; then
            echo "### 🔧 Refactoring" >> CHANGELOG.md
            echo "$REFS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Chores
          CHORES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^chore" || true)
          if [ -n "$CHORES" ]; then
            echo "### 📦 Chores" >> CHANGELOG.md
            echo "$CHORES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Docs
          DOCS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^docs" || true)
          if [ -n "$DOCS" ]; then
            echo "### 📝 Documentation" >> CHANGELOG.md
            echo "$DOCS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Style
          STYLES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^style" || true)
          if [ -n "$STYLES" ]; then
            echo "### 💄 Style" >> CHANGELOG.md
            echo "$STYLES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Tests
          TESTS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^test" || true)
          if [ -n "$TESTS" ]; then
            echo "### ✅ Tests" >> CHANGELOG.md
            echo "$TESTS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          echo "Generated changelog:"
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: release-artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
