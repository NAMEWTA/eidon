<!doctype html>
<!--
  ============================================================================
  EIDON 设计原型（design-only prototype）
  ----------------------------------------------------------------------------
  本 HTML 仅作为视觉/交互参考稿，**不是**第一步基座的运行实现，也不是 E2E 基准。
  实现版本运行于 Electron + Vite + React 19（见技术架构文档 §3、§4）：
    · Electron Renderer 进程内本地打包加载 React/ReactDOM/lucide-react，绝不联网
    · 字体随发行包附带或走系统字体回退
    · 自定义协议 eidon-res:// 服务大文件与二进制资源
  PRD §NFR-3 要求"完全离线、无任何联网依赖"，因此实现实现期严禁通过 CDN
  （Google Fonts / unpkg / esm.sh 等）按需拉取任何资源。
  此原型为节省迭代成本临时使用 CDN，仅用于本地直接打开 index.html 查看效果。
  ============================================================================
-->
